<h2>Redesign Scope</h2>
<p class="subtitle">Which areas should get the luxury real estate aesthetic?</p>

<div class="options">
  <div class="option" data-choice="dashboard" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>Dashboard + Login</h3>
      <p>All dashboard sections (products, transactions, staff) + login page</p>
    </div>
  </div>
  <div class="option" data-choice="full" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>Full Site</h3>
      <p>Everything: dashboard, login, AND landing page</p>
    </div>
  </div>
</div>
