<h2>Base Theme</h2>
<p class="subtitle">Dark or light background for the dashboard?</p>

<div class="options">
  <div class="option" data-choice="dark" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>Dark Base</h3>
      <p>Deep charcoal (#0d0d0d–#1a1a1a) — cinematic, dramatic, feels like a luxury penthouse at night</p>
    </div>
  </div>
  <div class="option" data-choice="light" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>Light Base</h3>
      <p>Warm off-white (#f5f2ee) — clean, editorial, feels like an architectural magazine spread</p>
    </div>
  </div>
</div>
