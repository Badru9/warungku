<h2>Color Palette</h2>
<p class="subtitle">Which accent color fits the luxury real estate vibe?</p>

<div class="options">
  <div class="option" data-choice="warm" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>Warm Luxury</h3>
      <p>Gold / bronze / champagne accents — feels like a high-end boutique hotel</p>
    </div>
  </div>
  <div class="option" data-choice="cool" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>Cool Modern</h3>
      <p>Teal / slate / architectural blue — feels like contemporary minimalist architecture</p>
    </div>
  </div>
</div>
